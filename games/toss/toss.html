<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>itsMeAsh</title>
	
	<link rel="stylesheet" href="toss.css">
	<script src="toss.js" defer></script>
</head>
<body>
	<main>
				<div id="row1">
			<div id="backButton"><img src="resource/back.svg" alt="Back"></div>
			<div><h1>Rock Paper Scissor</h1></div>
		</div>
		<div id="row2">
		<div id="sideDiv">
		<div id="probability">
			<table>
				<tr>
					<td></td>
					<th><p1>Heads</p1></th>
					<th><p1>Tails</p1></th>
				</tr>
				<tr>
					<th>Probability</th>
					<th><span id="probOfHeads">50%</span></th>
					<th><span id="probOfTails">50%</span></th>
				</tr>
			</table>
		</div>
		<div id="record">
			<table>
				<tr>
					<th>Last outcome</th>
					<th><span id="prevOutcome">None</span></th>
				</tr>
				<tr>
					<th>Mode</th>
					<th><span id="mode">None</span></th>
				</tr>
			</table>
		</div>
		</div>
		<div id="coin"><h1><span id="outcome">Heads</span></h1></div></div>
	</main>
</body>
</html>
